name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  #BUILD_CONFIGURATION: Release

permissions: write-all

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
       dotnet-version: '10.0.x'

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: publish-windows
      working-directory: ${{env.GITHUB_WORKSPACE}}
      ###run: dotnet publish -c Release -f ${{ env.NETVERSION }} -p:RuntimeIdentifierOverride=win10-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:WindowsAppSDKSelfContained=true
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

    - name: publish-linux
      # working-directory: ${{env.GITHUB_WORKSPACE}}
      run: dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true 

    - name: Get .NET Version 
      id: netversion
      shell: cmd      
      run: | 
        FOR /F "delims=" %%i IN ('dotnet msbuild ${{ github.workspace }}/ACNHPockets.csproj --getProperty:TargetFramework') DO (SET netversion=%%i)
        echo %netversion%
        echo netversion=%netversion%>>%GITHUB_OUTPUT%
        
    - name: .NET Version test     
      run: | 
        echo ${{ steps.netversion.outputs.netversion }}

    - name: copy csv and img files
      continue-on-error: true    
      run: | 
        robocopy ${{ github.workspace }}\img ${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\win-x64\publish\csv 
        robocopy ${{ github.workspace }}\csv ${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\win-x64\publish\csv        
        robocopy ${{ github.workspace }}\img ${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\linux-x64\publish\csv 
        robocopy ${{ github.workspace }}\csv ${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\linux-x64\publish\csv 

    - name: Show Github infos
      run:  echo 'Workspace path ${{ github.workspace }} - runner.temp ${{ runner.temp }}'     


      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      id: upload
      with:
        name: Release
        path: ${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\win-x64\publish\*
        overwrite: true
        retention-days: 1

    - name: Output artifact ID
      run:  echo 'Artifact ID is ${{ steps.upload.outputs.artifact-id }}'        
        
    - name: Output Artifact URL
      run:  echo 'Artifact URL is ${{ steps.upload.outputs.artifact-url }}'
         
    - name: list all dirs 
      run: ls -R
      
    - name: Create Release
      uses: actions/create-release@latest
      env:
        GITHUB_TOKEN: ${{ github.token }} 
      with:
        draft: false
        prerelease: false
        release_name: ${{ steps.version.outputs.version }}
        tag_name: ${{ github.run_number }}
        body: ${{ github.event.head_commit.message }}

    - name: Zipping up Release folder
      run: | 
        7z a windows-release.zip "${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\win-x64\publish\"
        7z a linux-release.zip "${{ github.workspace }}\bin\Release\${{ steps.netversion.outputs.netversion }}\linux-x64\publish\"
        
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false    
        tag_name: ${{ github.run_number }}
        body: ${{ github.event.head_commit.message }}
        files: ${{ github.workspace }}\windows-release.zip
      env:
        GITHUB_TOKEN: ${{ github.token }} 
        